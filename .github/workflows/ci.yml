name: Test or Release

on:
  push:
    branches:
      - master
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:

permissions:
  id-token: write
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    - run: npm test
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        use-cache: false
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        version: '>=0.0.1'

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    - run: npm test
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        use-cache: false
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        version: '>=0.0.1'

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        use-cache: false
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
    - uses: ./
      with:
        repo: prantlf/v-jsonlint
        version: '>=0.0.1'

  release:
    needs:
      - linux
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    - uses: prantlf/publish-release-action@v2
      if: ${{ github.ref_name == 'master' }}
      with:
        no-npm-auth: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
